version: 2

models:
  - name: int_employee_tenure_bands
    description: >
      Enriches employee data with tenure bands, age bands, and salary bands
      for segmented analysis across all marts.
    columns:
      - name: employee_id
        data_tests:
          - unique
          - not_null
      - name: tenure_band
        description: "Categorical tenure: <1yr, 1-3yr, 3-5yr, 5-10yr, 10+yr"
      - name: age_band
        description: "Categorical age: <30, 30-39, 40-49, 50+"
      - name: salary_band
        description: "Salary quartile: Q1, Q2, Q3, Q4"

  - name: int_absence_monthly
    description: >
      Monthly aggregated absence metrics per employee.
      Computes absence hours, count, and rate for absenteeism analysis.
    columns:
      - name: employee_id
        data_tests:
          - not_null
      - name: absence_hours
        description: "Total hours absent in the month"
      - name: absence_count
        description: "Number of absence events in the month"

  - name: int_compensation_history
    description: >
      Annualized compensation per employee with YoY growth rates.
      Used by salary analysis and equity marts.
    columns:
      - name: employee_id
        data_tests:
          - not_null

  - name: int_training_completion
    description: >
      Per-employee training completion summary: total courses,
      completed, hours, avg score, mandatory compliance rate.
    columns:
      - name: employee_id
        data_tests:
          - unique
          - not_null
      - name: completion_rate
        description: "Fraction of enrolled courses completed"
      - name: mandatory_completion_rate
        description: "Fraction of mandatory courses completed"

  - name: int_recruiting_funnel
    description: >
      Requisition-level recruiting funnel metrics:
      applicants, screened, interviewed, offered, hired, conversion rates.
    columns:
      - name: requisition_id
        data_tests:
          - unique
          - not_null
